<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevDash — Typed Async Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Header Section -->
    <header class="app-header">
      <div class="brand-section">
        <div class="logo-icon">DD</div>
        <div>
          <h1 class="brand-title">DevDash</h1>
          <p class="brand-subtitle">Strict TypeScript & Async/Await Dashboard</p>
        </div>
      </div>
    </header>

    <!-- Stats Dashboard Overview -->
    <section class="stats-overview">
      <div class="stat-card">
        <span class="stat-label">Total Products Loaded</span>
        <span class="stat-value" id="stat-total-products">-</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Categories Available</span>
        <span class="stat-value" id="stat-total-categories">-</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Avg. Product Price</span>
        <span class="stat-value" id="stat-avg-price">-</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Avg. Rating</span>
        <span class="stat-value" id="stat-avg-rating">-</span>
      </div>
    </section>

    <!-- Search, Filters, and Sorting Controls -->
    <section class="control-panel">
      <!-- Search Input (will be debounced later in Day 6) -->
      <div class="search-wrapper">
        <!-- Lucide Search Icon representation inside SVG -->
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input 
          type="text" 
          id="search-input" 
          class="search-input" 
          placeholder="Search products by title or description..."
          autocomplete="off"
        >
      </div>

      <!-- Filter Dropdown by Category -->
      <div class="filter-wrapper">
        <select id="category-filter">
          <option value="all">All Categories</option>
        </select>
      </div>

      <!-- Sorting Dropdown -->
      <div class="sort-wrapper">
        <select id="sort-select">
          <option value="none">Sort By (None)</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating-desc">Rating: High to Low</option>
          <option value="title-asc">Name: A to Z</option>
        </select>
      </div>

      <!-- Reset Controls Button -->
      <button id="reset-btn" class="reset-btn">Reset Filters</button>
    </section>

    <!-- Main Content Area containing List, Loading or Error States -->
    <main id="dashboard-content" class="dashboard-content">
      <!-- Content will be injected here dynamically by ui.ts -->
    </main>

  </div>

  <!-- Detail View Modal Overlay (Hidden by default) -->
  <div id="detail-overlay" class="detail-overlay">
    <div id="detail-modal" class="detail-modal">
      <!-- Dynamically populated by ui.ts -->
    </div>
  </div>

  <!-- Vite App Bootstrapper Entry Point -->
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
